services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - codex-switch-postgres:/var/lib/postgresql/data
    networks:
      - backend-internal

  redis:
    image: redis:7-alpine
    env_file:
      - .env
    command:
      - sh
      - -c
      - |
        if [ -n "$${REDIS_PASSWORD:-}" ]; then
          exec redis-server --requirepass "$${REDIS_PASSWORD}"
        fi
        exec redis-server
    networks:
      - backend-internal

  backend:
    build:
      context: ../..
      dockerfile: apps/admin/Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
    networks:
      backend-internal:
      kong-net:
        aliases:
          - codex-switch-backend

volumes:
  codex-switch-postgres:

networks:
  backend-internal:
  kong-net:
    external: true
